<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metals Trading CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪙</text></svg>" />
  <style>
/* ============================================================
   Metals Trading CRM — styles (no framework, fully offline)
   ============================================================ */
:root {
  --bg: #0f1620;
  --bg-2: #16202d;
  --panel: #1b2735;
  --panel-2: #223145;
  --line: #2c3e54;
  --text: #e7eef6;
  --muted: #93a4b8;
  --accent: #f5a623;
  --accent-2: #3b9ae1;
  --red: #e5484d;
  --yellow: #f5b915;
  --green: #30a46c;
  --radius: 12px;
  --shadow: 0 6px 22px rgba(0,0,0,.35);
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: radial-gradient(1200px 600px at 80% -10%, #1d2c3e 0%, var(--bg) 60%);
  color: var(--text);
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
a { color: var(--accent-2); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ---------- Layout ---------- */
.app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--line);
  padding: 16px 12px;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.main { display: flex; flex-direction: column; min-width: 0; }
.content { padding: 18px 22px 60px; }

/* ---------- Brand ---------- */
.brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 16px; }
.brand .logo {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), #c2703d);
  display: grid; place-items: center; font-weight: 800; color: #1a1206;
}
.brand h1 { font-size: 15px; margin: 0; line-height: 1.1; }
.brand small { color: var(--muted); font-size: 11px; }

/* ---------- Nav ---------- */
.nav-section { margin-top: 10px; }
.nav-section .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; padding: 8px 10px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 9px; cursor: pointer; color: var(--text);
  font-size: 13.5px; user-select: none;
}
.nav-item:hover { background: var(--panel); }
.nav-item.active { background: var(--panel-2); box-shadow: inset 0 0 0 1px var(--line); }
.nav-item .count {
  margin-left: auto; background: var(--panel-2); color: var(--muted);
  border-radius: 999px; font-size: 11px; padding: 1px 8px;
}
.nav-item.active .count { background: var(--accent); color: #1a1206; }

/* ---------- Price bar (pinned top) ---------- */
.pricebar {
  position: sticky; top: 0; z-index: 20;
  background: linear-gradient(180deg, #10171f, #0c1219);
  border-bottom: 1px solid var(--line);
  padding: 0; display: flex; align-items: stretch; gap: 0;
}
.pricebar .pb-title { font-weight: 700; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

/* horizontal trading-desk ticker */
.ticker { display: flex; flex: 1; overflow-x: auto; align-items: stretch; }
.ticker::-webkit-scrollbar { height: 6px; }
.ticker::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.tk {
  padding: 12px 20px 11px; min-width: 150px; flex: 0 0 auto;
  border-right: 1px solid rgba(255,255,255,.06); display: flex; flex-direction: column; justify-content: center; gap: 3px;
}
.tk-label { font-size: 11px; letter-spacing: .06em; color: #8b97a6; text-transform: uppercase; white-space: nowrap; }
.tk-price {
  font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  font-size: 21px; font-weight: 700; color: #f3f6fa; white-space: nowrap; line-height: 1.1;
}
.tk-chg { font-family: inherit; font-size: 12.5px; font-weight: 700; margin-left: 4px; }
.tk-chg.up { color: #46d07f; }
.tk-chg.down { color: #ef5a5a; }
.tk-chg.flat { color: #8b97a6; }
.tk-sub { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; color: #6f7c8b; white-space: nowrap; }
.tk-foot { display: flex; align-items: center; gap: 8px; }
.tk-spark { display: block; opacity: .9; }
.tk-spark-empty { width: 74px; height: 22px; display: inline-block; }
.pb-meta { display: flex; align-items: center; gap: 10px; padding: 0 16px; border-left: 1px solid var(--line); }
.tk-live { color: #46d07f; font-size: 11px; font-weight: 700; letter-spacing: .05em; animation: pulse 1.6s infinite; }
.chip {
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 6px 11px; display: flex; flex-direction: column; min-width: 96px;
}
.chip .k { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.chip .v { font-size: 15px; font-weight: 700; }
.chip .v small { font-size: 10px; color: var(--muted); font-weight: 500; }
.chip.premium { border-color: #4a6; }
.chip .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.pb-meta { color: var(--muted); font-size: 11.5px; display: flex; align-items: center; gap: 10px; }
.price-warn { color: var(--yellow); cursor: pointer; text-decoration: underline dotted; }
.price-warn:hover { color: #ffd35c; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
  border-radius: 9px; padding: 7px 12px; font-size: 13px; cursor: pointer;
  transition: .12s; white-space: nowrap;
}
.btn:hover { border-color: var(--accent-2); }
.btn.primary { background: var(--accent); color: #1a1206; border-color: var(--accent); font-weight: 700; }
.btn.primary:hover { filter: brightness(1.05); }
.btn.ghost { background: transparent; }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.btn.sm { padding: 5px 9px; font-size: 12px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ---------- Page header ---------- */
.page-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.page-head h2 { margin: 0; font-size: 20px; }
.page-head .sub { color: var(--muted); font-size: 13px; }
.spacer { flex: 1; }
.search {
  background: var(--panel); border: 1px solid var(--line); color: var(--text);
  border-radius: 9px; padding: 8px 12px; min-width: 220px;
}

/* ---------- Cards / grid ---------- */
.grid { display: grid; gap: 14px; }
.grid.cards { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 14px; box-shadow: var(--shadow);
}
.card h3 { margin: 0 0 2px; font-size: 15px; }
.card .meta { color: var(--muted); font-size: 12.5px; }

/* ---------- Tiles (dashboard / countries) ---------- */
.tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.tile {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 14px; cursor: pointer; transition: .12s; display: flex; align-items: center; gap: 12px;
}
.tile:hover { transform: translateY(-2px); border-color: var(--accent-2); }
.tile .flag { font-size: 26px; }
.tile .tname { font-weight: 600; }
.tile .tsub { color: var(--muted); font-size: 12px; }
.tile .mini-lights { margin-left: auto; display: flex; gap: 4px; }
.mini-dot { width: 9px; height: 9px; border-radius: 50%; opacity: .85; }

.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 18px; }
.stat { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
.stat .n { font-size: 26px; font-weight: 800; }
.stat .l { color: var(--muted); font-size: 12.5px; }

/* ---------- Tags / chips ---------- */
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.tag {
  font-size: 11.5px; padding: 3px 9px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--bg-2);
  display: inline-flex; align-items: center; gap: 5px;
}
.tag .swatch { width: 8px; height: 8px; border-radius: 50%; }

/* ---------- Traffic lights ---------- */
.lights { display: flex; gap: 6px; align-items: center; }
.light {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--line); background: #1a2433; cursor: pointer; position: relative;
  transition: .12s;
}
.light:hover { transform: scale(1.08); }
.light.on.red { background: var(--red); border-color: var(--red); box-shadow: 0 0 10px rgba(229,72,77,.6); }
.light.on.yellow { background: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 10px rgba(245,185,21,.6); }
.light.on.green { background: var(--green); border-color: var(--green); box-shadow: 0 0 10px rgba(48,164,108,.6); }
.status-line { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
.status-text { font-size: 12px; color: var(--muted); }
.reply-badge {
  background: var(--green); color: #04140c; font-weight: 700; font-size: 11px;
  padding: 2px 9px; border-radius: 999px; cursor: pointer; animation: pulse 1.6s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

.contact-line { color: var(--muted); font-size: 12.5px; margin: 2px 0; display: flex; gap: 7px; align-items: center; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

/* ---------- Modal ---------- */
.modal-bg {
  position: fixed; inset: 0; background: rgba(4,8,14,.66); backdrop-filter: blur(2px);
  display: grid; place-items: center; z-index: 50; padding: 20px;
}
.modal {
  background: var(--bg-2); border: 1px solid var(--line); border-radius: 14px;
  width: min(640px, 100%); max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow);
}
.modal header { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; }
.modal header h3 { margin: 0; font-size: 16px; }
.modal .body { padding: 18px; }
.modal footer { padding: 14px 18px; border-top: 1px solid var(--line); display: flex; gap: 8px; justify-content: flex-end; }
.x { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 20px; background: none; border: none; }

/* ---------- Forms ---------- */
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--panel); border: 1px solid var(--line); color: var(--text);
  border-radius: 9px; padding: 9px 11px; font-size: 13.5px; font-family: inherit;
}
.field textarea { resize: vertical; min-height: 70px; }
.field-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; max-height: 240px; overflow-y: auto; padding: 4px; border: 1px solid var(--line); border-radius: 9px; }
.check { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.check input { width: auto; }

/* ---------- Misc ---------- */
.empty { text-align: center; color: var(--muted); padding: 50px 20px; }
.empty .big { font-size: 40px; margin-bottom: 8px; }
.notice { background: #1d2c1f; border: 1px solid #2f6b43; color: #bfe6cc; padding: 10px 13px; border-radius: 10px; font-size: 12.5px; margin-bottom: 14px; }
.notice.warn { background: #2c241a; border-color: #6b5330; color: #e8d4b0; }
.kbd { background: var(--panel-2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; font-size: 11px; }
.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: var(--panel-2); border: 1px solid var(--accent-2); color: var(--text);
  padding: 11px 18px; border-radius: 10px; box-shadow: var(--shadow); z-index: 99; font-size: 13px;
}
.legend { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 12px; align-items: center; }
.legend .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: -1px; }

@media (max-width: 820px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
}


/* ---------- People (Apollo contacts) ---------- */
.people { margin: 10px 0 4px; border-top: 1px dashed var(--line); padding-top: 9px; }
.people-h { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; display: flex; align-items: center; }
.people-refresh { margin-left: auto; cursor: pointer; color: var(--accent-2); text-transform: none; letter-spacing: 0; font-size: 11px; }
.people-refresh:hover { text-decoration: underline; }
.person {
  display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 4px 8px;
  padding: 6px 8px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 6px; background: var(--bg-2);
}
.person .p-name { font-weight: 600; font-size: 13px; }
.person .p-title { grid-column: 1; color: var(--muted); font-size: 12px; }
.person .p-email { grid-column: 1; color: var(--accent-2); font-size: 12px; word-break: break-all; }
.person .p-actions { grid-column: 2; grid-row: 1 / span 3; display: flex; align-items: center; gap: 8px; }
.person-mail, .person-del, .person-locked, .person-thread { cursor: pointer; font-size: 14px; }
.person-del { color: var(--muted); }
.person-del:hover { color: var(--red); }
.person-mail:hover, .person-thread:hover { transform: scale(1.15); }

/* per-person mini traffic lights */
.plights { display: inline-flex; gap: 3px; margin-right: 4px; vertical-align: middle; }
.plight { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--line); background: #1a2433; cursor: pointer; padding: 0; }
.plight:hover { transform: scale(1.18); }
.plight.on.red { background: var(--red); border-color: var(--red); }
.plight.on.yellow { background: var(--yellow); border-color: var(--yellow); }
.plight.on.green { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(48,164,108,.55); }

/* ---------- People picker modal ---------- */
.pick-list { display: flex; flex-direction: column; gap: 8px; }
.pick {
  display: flex; gap: 11px; align-items: flex-start;
  border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px; cursor: pointer; background: var(--panel);
}
.pick:hover { border-color: var(--accent-2); }
.pick input { margin-top: 3px; }
.pick-name { font-weight: 600; }
.pick-name small { color: var(--muted); font-weight: 500; font-size: 11px; }
.pick-title { color: var(--text); font-size: 12.5px; }
.pick-contact { color: var(--muted); font-size: 12px; margin-top: 2px; }


/* ---------- Custom sheet (Excel-style table) ---------- */
table.sheet { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
table.sheet th { text-align: left; font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; padding: 10px 10px; background: var(--bg-2); border-bottom: 1px solid var(--line); }
table.sheet td { padding: 5px 8px; border-bottom: 1px solid var(--line); }
table.sheet tr:last-child td { border-bottom: none; }
table.sheet input, table.sheet select {
  width: 100%; background: transparent; border: 1px solid transparent; color: var(--text);
  border-radius: 7px; padding: 7px 8px; font: inherit; font-size: 13px;
}
table.sheet input:hover, table.sheet select:hover { border-color: var(--line); }
table.sheet input:focus, table.sheet select:focus { outline: none; border-color: var(--accent-2); background: var(--bg-2); }
table.sheet td:last-child { width: 44px; text-align: center; }


/* ---------- Dashboard follow-ups + alerts + filters ---------- */
.followups { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.fu { display: flex; align-items: center; gap: 10px; }
.fu-name { flex: 1; cursor: pointer; }
.fu-name:hover { color: var(--accent-2); text-decoration: underline; }
.fu-days { color: var(--yellow); font-size: 12px; font-weight: 700; }
.alert-chip { display: inline-block; background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px 11px; margin: 3px 4px 0 0; cursor: pointer; font-size: 12.5px; }
.alert-chip:hover { border-color: var(--accent); }
.filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.filters .search { min-width: 0; }

/* ---------- Activity timeline ---------- */
.timeline { border: 1px solid var(--line); border-radius: 9px; padding: 8px; max-height: 180px; overflow-y: auto; background: var(--bg-2); }
.tl { font-size: 12.5px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.tl-date { color: var(--muted); font-size: 11px; margin-right: 6px; }

/* ---------- Margins + templates ---------- */
.margins { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; max-height: 260px; overflow-y: auto; padding: 4px; border: 1px solid var(--line); border-radius: 9px; }
.mg { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.mg span { flex: 1; }
.mg input { width: 70px; background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 5px 7px; }
.tpl-list { display: flex; flex-direction: column; gap: 6px; margin: 8px 0; }
.tpl { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; }

/* ---------- Offer table ---------- */
table.offer tfoot td { border-top: 2px solid var(--line); }
table.offer .up, table.offer .lt { font-family: ui-monospace, Menlo, Consolas, monospace; }


/* build/version tag in the sidebar */
.nav-version { margin-top: 14px; padding: 8px 10px; color: #5a6776; font-size: 10.5px; letter-spacing: .03em; border-top: 1px solid var(--line); }


/* ---------- Custom sheet categories ---------- */
.sheet-cat { margin-bottom: 14px; }
.sheet-cat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.cat-name { background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 15px; font-weight: 700; min-width: 220px; }
.cat-name:focus { outline: none; border-color: var(--accent-2); }


/* ---------- Deal pipeline (Kanban) ---------- */
.pipe-board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; align-items: flex-start; }
.pipe-col { flex: 0 0 230px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 8px; }
.pipe-head { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 13px; padding: 6px 4px 8px; border-top: 3px solid var(--line); border-radius: 2px; margin-bottom: 6px; }
.deal { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 9px; margin-bottom: 7px; }
.deal-t { font-weight: 600; font-size: 13px; }
.deal-m { color: var(--muted); font-size: 12px; margin: 2px 0; }
.deal-v { font-family: ui-monospace, Menlo, monospace; font-weight: 700; color: var(--accent); }
.deal-actions { display: flex; gap: 5px; margin-top: 7px; align-items: center; }
.deal-actions select { flex: 1; min-width: 0; background: var(--bg-2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 4px; font-size: 11px; }

/* ---------- Tasks ---------- */
.tasklist { display: flex; flex-direction: column; gap: 6px; max-width: 760px; }
.task { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; }
.task.done .task-text { text-decoration: line-through; color: var(--muted); }
.task-text { flex: 1; background: transparent; border: 1px solid transparent; color: var(--text); border-radius: 6px; padding: 6px 8px; font: inherit; }
.task-text:hover, .task-text:focus { border-color: var(--line); outline: none; background: var(--bg-2); }
.task-due { background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 5px 7px; font-size: 12px; }
.task-due.overdue { border-color: var(--red); color: var(--red); }

/* ---------- Calculator ---------- */
.calc-out { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 10px; }
.calc-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13.5px; }
.calc-row span:last-child { font-family: ui-monospace, Menlo, monospace; }
.calc-row.strong { font-weight: 700; font-size: 15px; color: var(--accent); }


/* ---------- WhatsApp ---------- */
.btn.wa { color: #25d366; border-color: #1f7a44; text-decoration: none; }
.btn.wa:hover { border-color: #25d366; }
.person-wa { cursor: pointer; font-size: 14px; text-decoration: none; }
.person-wa:hover { transform: scale(1.15); }


/* ---------- Nav search ---------- */
.nav-search { padding: 4px 8px 10px; }
.nav-search input { width: 100%; background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: 9px; padding: 8px 10px; font-size: 13px; }
.nav-search input:focus { outline: none; border-color: var(--accent-2); }

/* ---------- Markets ---------- */
.al-row { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
.al-row:last-child { border-bottom: none; }
.al-row span:first-child { color: var(--muted); font-size: 12px; }

/* ---------- Calendar ---------- */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; padding: 4px; text-align: center; }
.cal-cell { min-height: 84px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 4px 5px; }
.cal-cell.empty { background: transparent; border: none; }
.cal-cell.today { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.cal-d { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.cal-ev { font-size: 10.5px; border-radius: 5px; padding: 2px 5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-ev.task { background: #243a52; color: #bcd; }
.cal-ev.ship { background: #14323f; color: #8fd; }
.cal-ev.follow { background: #3a2f16; color: #f0d79a; }

/* ---------- Search results ---------- */
.srch { padding: 8px 10px; border-bottom: 1px solid var(--line); cursor: pointer; }
.srch:hover { background: var(--panel-2); }
.srch:last-child { border-bottom: none; }
.del-prod { cursor: pointer; color: var(--muted); margin-left: 4px; }
.del-prod:hover { color: var(--red); }


/* ---------- Email opens badge ---------- */
.opens-badge { background: #243a52; color: #9fd0ff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }

</style>

   prices.js  —  formatting, derived values, optional live feed

    // Convert a stored USD value to the chosen display currency.
    toDisplay: function (usd) {
      if (usd == null || isNaN(usd)) return null;
      var s = App.Store.settings();
      var ccy = s.displayCurrency || "USD";
      if (ccy === "USD") return Number(usd);

      if (rates[ccy]) return Number(usd) * rates[ccy];        // units of ccy per USD
      if (ccy === "EUR" && App.Store.prices().fx) return Number(usd) / Number(App.Store.prices().fx); // legacy

    currencySymbol: function () {
      return { USD: "$", EUR: "€", GBP: "£", CNY: "¥" }[App.Store.settings().displayCurrency] || "$";

        .catch(function () { return { configured: false, connected: false, unreachable: true }; });
    },

    connectUrl: function () { return this.base() + "/api/gmail/auth"; },

    /* Ask the proxy which of these emails have replied / been contacted. */
    check: function (emails) {
      return fetch(this.base() + "/api/gmail/check", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ emails: emails })
      }).then(function (r) {
        return r.json().then(function (j) {
          if (!r.ok) throw new Error(j.error || ("Proxy responded " + r.status));
          return j.results || {};
        });
      }).catch(function (err) {
        if (err instanceof TypeError) {
          throw new Error("Can't reach the proxy at " + Gmail.base() + ". Start it first (see README).");
        }
        throw err;
      });
    }
  };

  App.Gmail = Gmail;

})(window.App);

  <script>
/* ============================================================
   sync.js  —  optional team sync (shared data via the proxy)
   ------------------------------------------------------------
   When "Team sync" is enabled in Settings, the app pulls the
   shared state from the proxy's /api/data on load and pushes
   local changes back (debounced). Last-write-wins — best for a
   small desk; teammates click "Pull" to grab the latest.
   ============================================================ */
window.App = window.App || {};

(function (App) {
  "use strict";

  var pushTimer = null;

  var Sync = {
    enabled: function () { return !!App.Store.settings().teamSync; },

    url: function () {
      var s = App.Store.settings();
      var base = (s.syncServerUrl || s.apolloProxyUrl || "http://localhost:8787").trim().replace(/\/+$/, "");
      return base + "/api/data";
    },

    headers: function () {
      var h = { "Content-Type": "application/json" };
      var t = App.Store.settings().syncToken;
      if (t) h["X-Data-Token"] = t;
      return h;
    },

    pull: function () {
      return fetch(this.url(), { headers: this.headers() }).then(function (r) {
        return r.json().then(function (j) {
          if (!r.ok) throw new Error(j.error || ("Sync server " + r.status));
          return j; // { state, rev, updatedAt }
        });
      });
    },

    push: function () {
      var payload = { state: App.Store.get() };
      return fetch(this.url(), { method: "PUT", headers: this.headers(), body: JSON.stringify(payload) })
        .then(function (r) {
          return r.json().then(function (j) {
            if (!r.ok) throw new Error(j.error || ("Sync server " + r.status));
            return j; // { rev, updatedAt }
          });
        });
    },

    // Debounced auto-push, wired as the Store change hook.
    schedulePush: function () {
      if (!Sync.enabled()) return;
      clearTimeout(pushTimer);
      pushTimer = setTimeout(function () {
        Sync.push().catch(function (e) { console.warn("[sync] push failed:", e.message); });
      }, 1500);
    },

    // Called once at boot: pull shared state, then listen for local edits.
    init: function (onPulled) {
      App.Store.setChangeHook(Sync.schedulePush);
      if (!Sync.enabled()) return;
      Sync.pull().then(function (j) {
        if (j && j.state && App.Store.applyRemote(j) && onPulled) onPulled();
      }).catch(function (e) { console.warn("[sync] initial pull failed:", e.message); });
    }
  };

  App.Sync = Sync;

})(window.App);

</script>
  <script>
/* ============================================================

window.App = window.App || {};

(function (App) {

  /* =========================================================

    var cards = App.TICKER.map(function (t) {

  /* ---- Dashboard ---- */
  function buyersBuyingMetal(rowKey) {
    var metalKey = rowKey === "nickel" ? "stainless" : rowKey;
    return Store.companies().filter(function (c) {
      return (c.materials || []).some(function (id) { var p = App.productById(id); return p && p.metal === metalKey; });
    });
  }
  function viewDashboard() {
    var all = Store.companies();
    var red = all.filter(function (c) { return c.status === "red"; }).length;
    var yellow = all.filter(function (c) { return c.status === "yellow"; }).length;
    var green = all.filter(function (c) { return c.status === "green"; }).length;
    var withReply = all.filter(function (c) { return c.status === "green"; });

    var replyBanner = withReply.length
      ? '<div class="notice">📬 <strong>' + withReply.length + " buyer(s) replied</strong> — go read and follow up: " +

      : "";

    // All 27 EU countries plus any custom countries.
    var tileCountries = App.COUNTRIES.concat(Store.customCountries());
    var tiles = tileCountries.map(function (c) {
      var list = Store.companiesByCountry(c.code);
      var dots = ["red", "yellow", "green"].map(function (st) {

      }).join("");
      return '<div class="tile" data-nav="country:' + c.code + '">' +
        '<span class="flag">' + c.flag + "</span>" +
        "<div><div class=\"tname\">" + esc(c.name) + "</div>" +
        '<div class="tsub">' + list.length + " buyer" + (list.length === 1 ? "" : "s") + "</div></div>" +
        '<span class="mini-lights">' + dots + "</span></div>";
    }).join("");

    var contacted = yellow + green;
    var total = all.length || 1;
    var contactRate = Math.round(contacted / total * 100);
    var replyRate = contacted ? Math.round(green / contacted * 100) : 0;

    // Follow-up reminders: stuck on 'awaiting reply' beyond the threshold.
    var followDays = Number(Store.settings().followUpDays) || 4;
    var now = Date.now();
    var followUps = all.filter(function (c) { return c.status === "yellow" && c.lastEmailAt && (now - c.lastEmailAt) > followDays * 86400000; });
    var followHtml = followUps.length
      ? '<div class="card" style="margin-bottom:16px;"><h3>⏰ Needs follow-up (' + followUps.length + ")</h3>" +
        '<div class="meta">No reply after ' + followDays + " days — give them a nudge.</div><div class=\"followups\">" +
        followUps.slice(0, 15).map(function (c) {
          var days = Math.floor((now - c.lastEmailAt) / 86400000);
          return '<div class="fu"><span class="fu-name" data-nav="country:' + c.country + '">' + esc(c.name) + "</span>" +
            '<span class="fu-days">' + days + "d</span>" +
            '<button class="btn sm primary" data-action="send-email" data-id="' + c.id + '">✉️ Follow up</button></div>';
        }).join("") + "</div></div>"
      : "";

    // Price-move alerts: metals that moved more than the alert threshold.
    var alertPct = Number(Store.settings().alertPct) || 2;
    var pr = Store.prices();
    var moves = [];
    ["copper", "aluminium", "zinc", "lead", "nickel"].forEach(function (mk) {
      var pct = Prices.changePct(pr.rows[mk]);
      if (pct != null && Math.abs(pct) >= alertPct) moves.push({ key: mk, pct: pct });
    });
    var alertHtml = moves.length
      ? '<div class="notice warn" style="margin-bottom:16px;">📈 <strong>Market moves</strong> — act on these: ' +
        moves.map(function (m) {
          var pm = m.key === "nickel" ? "stainless" : m.key;
          var n = buyersBuyingMetal(m.key).length;
          var arrow = m.pct >= 0 ? "▲" : "▼";
          var lbl = (App.METALS[m.key === "nickel" ? "stainless" : m.key] || {}).label || m.key;
          return '<span class="alert-chip" data-action="alert-filter" data-metal="' + pm + '">' +

            (n ? '<span class="alert-chip mail" data-action="email-metal" data-metal="' + pm + '" title="Open drafts for these buyers">✉️ email all</span>' : "");

    return '<div class="page-head"><div><h2>Sales Dashboard</h2>' +

  function stat(n, l) { return '<div class="stat"><div class="n">' + n + '</div><div class="l">' + esc(l) + "</div></div>"; }

  /* ---- Products (+ custom catalog editor) ---- */

  /* ---- Reports / P&L ---- */
  function viewReports() {
    var deals = Store.deals();
    var won = deals.filter(function (d) { return d.stage === "won"; });
    var open = deals.filter(function (d) { return d.stage !== "won" && d.stage !== "lost"; });
    function sum(arr, f) { return arr.reduce(function (a, d) { return a + (Number(d[f]) || 0); }, 0); }
    var wonRev = sum(won, "value"), wonCost = sum(won, "cost"), wonProfit = wonRev - wonCost;
    var openRev = sum(open, "value"), openProfit = openRev - sum(open, "cost");
    var margin = wonRev ? Math.round(wonProfit / wonRev * 100) : 0;

    // by product (won)
    var byProd = {}; won.forEach(function (d) { var k = d.product || "—"; byProd[k] = byProd[k] || { rev: 0, profit: 0 }; byProd[k].rev += Number(d.value) || 0; byProd[k].profit += (Number(d.value) || 0) - (Number(d.cost) || 0); });
    var prodRows = Object.keys(byProd).map(function (k) {
      return "<tr><td>" + esc(k) + "</td><td>" + Prices.money(byProd[k].rev) + "</td><td>" + Prices.money(byProd[k].profit) + "</td></tr>";
    }).join("") || '<tr><td colspan="3" class="status-text">No won deals yet.</td></tr>';

    // by month (won)
    var byMonth = {}; won.forEach(function (d) { var m = new Date(d.updatedAt || d.createdAt || Date.now()).toLocaleDateString("en-GB", { month: "short", year: "2-digit" }); byMonth[m] = byMonth[m] || { rev: 0, profit: 0 }; byMonth[m].rev += Number(d.value) || 0; byMonth[m].profit += (Number(d.value) || 0) - (Number(d.cost) || 0); });
    var monthRows = Object.keys(byMonth).map(function (m) {
      return "<tr><td>" + esc(m) + "</td><td>" + Prices.money(byMonth[m].rev) + "</td><td>" + Prices.money(byMonth[m].profit) + "</td></tr>";
    }).join("") || '<tr><td colspan="3" class="status-text">No won deals yet.</td></tr>';

    return '<div class="page-head"><div><h2>Reports &amp; P&amp;L</h2><div class="sub">Realised vs pipeline performance (values in your display currency).</div></div></div>' +
      '<div class="stat-row">' +
        stat(Prices.money(wonRev), "Won revenue") +
        statDot(Prices.money(wonProfit), "Won profit", "green") +
        stat(margin + "%", "Avg margin") +
        stat(Prices.money(openRev), "Pipeline value") +
        stat(Prices.money(openProfit), "Pipeline profit") +
      "</div>" +
      '<div class="grid cards" style="grid-template-columns:1fr 1fr;">' +
        '<div class="card"><h3>Won by product</h3><table class="sheet"><thead><tr><th>Product</th><th>Revenue</th><th>Profit</th></tr></thead><tbody>' + prodRows + "</tbody></table></div>" +
        '<div class="card"><h3>Won by month</h3><table class="sheet"><thead><tr><th>Month</th><th>Revenue</th><th>Profit</th></tr></thead><tbody>' + monthRows + "</tbody></table></div>" +
      "</div>";
  }

  /* ---- Calendar: tasks, follow-ups, shipment ETAs ---- */
  function viewCalendar() {
    var base = new Date(); base.setDate(1); base.setMonth(base.getMonth() + calOffset);
    var year = base.getFullYear(), month = base.getMonth();
    var first = new Date(year, month, 1), startDow = (first.getDay() + 6) % 7; // Monday-first
    var days = new Date(year, month + 1, 0).getDate();
    var ev = {}; // 'YYYY-M-D' -> [{type,text}]
    function add(d, type, text) { if (!d) return; var k = d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate(); (ev[k] = ev[k] || []).push({ type: type, text: text }); }
    Store.tasks().forEach(function (t) { if (t.due && !t.done) add(new Date(t.due), "task", "✅ " + (t.text || "task")); });
    Store.deals().forEach(function (d) { if (d.eta) add(new Date(d.eta), "ship", "🚢 " + (d.title || "ETA")); });
    var fd = (Number(Store.settings().followUpDays) || 4) * 86400000;
    Store.companies().forEach(function (c) { if (c.status === "yellow" && c.lastEmailAt) add(new Date(c.lastEmailAt + fd), "follow", "📧 " + c.name); });

    var cells = "";
    for (var i = 0; i < startDow; i++) cells += '<div class="cal-cell empty"></div>';
    for (var day = 1; day <= days; day++) {
      var k = year + "-" + month + "-" + day;
      var list = (ev[k] || []).map(function (e) { return '<div class="cal-ev ' + e.type + '">' + esc(e.text) + "</div>"; }).join("");
      var today = new Date(); var isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
      cells += '<div class="cal-cell' + (isToday ? " today" : "") + '"><div class="cal-d">' + day + "</div>" + list + "</div>";
    }
    var dow = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map(function (d) { return '<div class="cal-dow">' + d + "</div>"; }).join("");
    var title = base.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    return '<div class="page-head"><div><h2>Calendar</h2><div class="sub">Tasks, follow-ups &amp; shipment ETAs.</div></div>' +
      '<div class="spacer"></div><button class="btn sm" data-action="cal-prev">‹</button><span style="padding:0 10px;font-weight:700">' + esc(title) +
      '</span><button class="btn sm" data-action="cal-next">›</button></div>' +
      '<div class="cal-grid">' + dow + cells + "</div>";
  }

    var deals = Store.deals().filter(function (d) { return hit(d.title) || hit(d.buyer) || hit(d.product); });
    var tasks = Store.tasks().filter(function (t) { return hit(t.text); });
    var contacts = [];
    Store.sheetCategories().forEach(function (cat) { (cat.contacts || []).forEach(function (ct) { if (hit(ct.name) || hit(ct.company) || hit(ct.email)) contacts.push({ cat: cat.name, ct: ct }); }); });

      var thread = p.email
        ? '<span class="person-thread" data-action="person-thread" data-id="' + c.id + '" data-idx="' + idx + '" title="Open this contact\'s Gmail thread">🔎</span>' : "";
      var wa = p.phone ? '<a class="person-wa" href="' + waUrl(p.phone) + '" target="_blank" rel="noopener" title="WhatsApp">💬</a>' : "";
      var pst = p.status || "red";

        '<span class="p-name">' + esc(p.name || "—") + "</span>" +
        '<span class="p-title">' + esc(p.title || "") + "</span>" +

        "</span></div>";
    }).join("");
    var peopleBlock = (c.people && c.people.length)
      ? '<div class="people"><div class="people-h">👥 Buyers / procurement (' + c.people.length + ")" +
        '<span class="people-refresh" data-action="refresh-phones" data-id="' + c.id + '" title="Pull phone numbers that arrived via Apollo webhook">↻ phones</span>' +

      '<div style="display:flex;align-items:flex-start;gap:8px;">' +
        "<div style=\"flex:1;min-width:0;\"><h3>" + esc(c.name || "(unnamed buyer)") + "</h3>" +

      peopleBlock +
      '<div class="status-line">' +
        '<div class="lights">' + light("red", "Not contacted") + light("yellow", "Awaiting reply") + light("green", "Replied") + "</div>" +

        (c.phone ? '<a class="btn sm wa" href="' + waUrl(c.phone) + '" target="_blank" rel="noopener">💬 WhatsApp</a>' : "") +
        '<button class="btn sm" data-action="make-offer" data-id="' + c.id + '">💰 Offer</button>' +
        '<button class="btn sm" data-action="make-docs" data-id="' + c.id + '">📄 Docs</button>' +
        '<button class="btn sm" data-action="find-buyers" data-id="' + c.id + '">👥 More contacts</button>' +
        '<button class="btn sm" data-action="open-thread" data-id="' + c.id + '">📧 Gmail history</button>' +
        '<button class="btn sm" data-action="edit-company" data-id="' + c.id + '">✎ Edit</button>' +
        '<button class="btn sm danger" data-action="del-company" data-id="' + c.id + '">🗑</button>' +
      "</div></div>";

  function normUrl(u) {
    if (!u) return "#";
    return /^https?:\/\//i.test(u) ? u : "https://" + u;
  }

  function openModal(title, bodyHtml, footerHtml) {
    $("modal-root").innerHTML =
      '<div class="modal-bg" data-action="modal-bg"><div class="modal">' +
        "<header><h3>" + esc(title) + '</h3><button class="x" data-action="close-modal">×</button></header>' +
        '<div class="body">' + bodyHtml + "</div>" +
        (footerHtml ? "<footer>" + footerHtml + "</footer>" : "") +
      "</div></div>";
  }
  function closeModal() { $("modal-root").innerHTML = ""; }
  App.closeModal = closeModal;

  function companyForm(c) {
    c = c || {};
    var isEdit = !!c.id;
    var countryOpts = App.allCountries().map(function (x) {
      return '<option value="' + x.code + '"' + (c.country === x.code ? " selected" : "") + ">" + x.flag + " " + esc(x.name) + "</option>";
    }).join("");
    var checks = App.allProducts().map(function (p) {
      var on = (c.materials || []).indexOf(p.id) !== -1;

        esc(p.name) + "</label>";

    function fld(key, label, ph) {
      return '<div class="field"><label>' + esc(label) + "</label>" +
        '<input data-f="' + key + '" value="' + esc(c[key] || "") + '" placeholder="' + esc(ph || "") + '"/></div>';

      fld("name", "Company name", "e.g. Aurubis AG") +
      '<div class="field-2">' +
        '<div class="field"><label>Country</label><select data-f="country">' + countryOpts + "</select></div>" +

      '<button class="btn primary" data-action="save-company" data-id="' + (c.id || "") + '">' + (isEdit ? "Save changes" : "Add buyer") + "</button>";

    if (p.metal === "brass") return Prices.brassIndicative(pr);
    if (p.metal === "iron") return null;
    return pr.rows[p.metal] && pr.rows[p.metal].value;
  }
  function productOfferUnitUSD(p) {
    var base = productBaseUSD(p);
    if (base == null) return null;
    var marginPct = Number((Store.settings().margins || {})[p.id] || 0);
    var unit = base * (1 + marginPct / 100);
    if (p.metal === "aluminium") {
      var prem = Store.prices().rows.aluminium && Store.prices().rows.aluminium.premium;
      if (prem) unit += Number(prem);
    }
    return Math.round(unit);
  }

  App.recalcOffer = function () {
    var modal = document.querySelector(".modal");
    if (!modal) return;
    var grandUSD = 0;
    modal.querySelectorAll("tbody tr[data-pid]").forEach(function (tr) {
      var inp = tr.querySelector(".q"); if (!inp) return;
      var unit = Number(inp.getAttribute("data-up"));
      var qty = Number(inp.value) || 0;
      if (!isNaN(unit) && inp.getAttribute("data-up") !== "") {
        tr.querySelector(".lt").textContent = Prices.money(unit * qty);
        grandUSD += unit * qty;
      }
    });
    var g = modal.querySelector("#offer-grand"); if (g) g.textContent = Prices.money(grandUSD);
  };

  function readOffer(modal) {
    var lines = [];
    modal.querySelectorAll("tbody tr[data-pid]").forEach(function (tr) {
      var inp = tr.querySelector(".q"); if (!inp || inp.getAttribute("data-up") === "") return;
      var p = App.productById(tr.getAttribute("data-pid"));
      var unit = Number(inp.getAttribute("data-up")); var qty = Number(inp.value) || 0;
      lines.push({ name: p ? p.name : "", qty: qty, unit: unit, total: unit * qty });
    });
    return {
      lines: lines,
      inco: (modal.querySelector("#offer-inco") || {}).value || "",
      port: (modal.querySelector("#offer-port") || {}).value || "",
      validity: (modal.querySelector("#offer-valid") || {}).value || "",
      payment: (modal.querySelector("#offer-pay") || {}).value || "",
      notes: (modal.querySelector("#offer-notes") || {}).value || ""
    };
  }

    var grand = o.lines.reduce(function (a, l) { return a + l.total; }, 0);

  /* Bulk: find buyers for every company (optionally in one country) with a
     polite delay between Apollo calls so we don't hammer rate limits. */
  function bulkFindBuyers(countryCode) {
    var list = (countryCode ? Store.companiesByCountry(countryCode) : Store.companies())
      .filter(function (c) { return (c.website || "").trim(); });
    if (!list.length) {
      toast("No companies with a website here. Add websites first so Apollo can match them.");
      return;
    }
    var settings = Store.settings();
    var warn = settings.revealContacts
      ? "\n\nHeads up: 'Reveal emails/phones' is ON, so this spends Apollo credits for each company."
      : "";
    if (!confirm("Find buyer/procurement contacts for " + list.length + " company(ies) via Apollo?" + warn)) return;

    var i = 0, totalPeople = 0, failed = 0;
    var DELAY = 1300; // ms between calls — rate-limit friendly

    function step() {
      if (i >= list.length) {
        render();
        toast("Done — added " + totalPeople + " contact(s) across " + list.length +
          " company(ies)" + (failed ? " · " + failed + " failed (no match / error)." : "."));
        return;
      }
      var c = list[i];
      toast("Apollo " + (i + 1) + "/" + list.length + ": " + (c.name || "company") + "…");
      App.Apollo.findBuyers(c).then(function (res) {
        totalPeople += Store.addPeople(c.id, res.people || []);
      }).catch(function () {
        failed++;
      }).then(function () {
        i++;
        setTimeout(step, DELAY);
      });
    }
    step();

  /* Collect every email address tied to a company (primary + discovered people). */
  function companyEmails(c) {
    var set = {};
    if (c.email) set[c.email.toLowerCase()] = 1;

    return Object.keys(set);
  }

  /* Sync traffic-light status from Gmail: reply -> green, contacted -> yellow. */
  function syncGmail() {
    var companies = Store.companies();
    var emails = [];
    companies.forEach(function (c) { emails = emails.concat(companyEmails(c)); });
    emails = emails.filter(function (e, i) { return emails.indexOf(e) === i; });
    if (!emails.length) { toast("No buyer emails yet — add or find contacts first."); return; }

    toast("Syncing with Gmail…");
    App.Gmail.check(emails).then(function (results) {
      // detect "not connected" responses
      var notConnected = emails.every(function (e) {
        var r = results[e]; return r && r.error && /not connected|not configured/i.test(r.error);
      });
      if (notConnected) {
        toast("Gmail isn't connected yet — open Settings → Connect Gmail.");
        return;
      }
      var greens = 0, yellows = 0;
      companies.forEach(function (c) {
        // Update each discovered contact individually first.
        (c.people || []).forEach(function (p, idx) {
          if (!p.email) return;
          var r = results[p.email.toLowerCase()];
          if (!r) return;
          if (r.replied && p.status !== "green") { Store.setPersonStatus(c.id, idx, "green", { lastReplyAt: Date.now() }); }
          else if (r.contacted && (p.status || "red") === "red") { Store.setPersonStatus(c.id, idx, "yellow", { lastEmailAt: p.lastEmailAt || Date.now() }); }
        });
        // Then the company headline (its own primary email, or rolled up from people).
        var mine = companyEmails(c);
        var replied = mine.some(function (e) { return results[e] && results[e].replied; });
        var contacted = mine.some(function (e) { return results[e] && results[e].contacted; });
        if (replied) {
          if (c.status !== "green") { Store.setStatus(c.id, "green", { lastReplyAt: Date.now() }); greens++; }
        } else if (contacted && c.status === "red") {
          Store.setStatus(c.id, "yellow", { lastEmailAt: c.lastEmailAt || Date.now() }); yellows++;
        }
      });
      render();
      toast("Gmail synced — " + greens + " new reply(ies) 🟢, " + yellows + " marked awaiting 🟡.");
    }).catch(function (err) { toast(err.message); });
  }

      else el.innerHTML = "🟡 Configured but not connected — click “Connect Gmail”.";
    });
  }

  /* =========================================================
     CSV PARSER (simple, quote-aware)
     ========================================================= */
  function parseCSV(text) {
    var rows = [], row = [], cur = "", q = false, i, ch;
    for (i = 0; i < text.length; i++) {
      ch = text[i];
      if (q) {
        if (ch === '"' && text[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { q = false; }
        else cur += ch;
      } else {
        if (ch === '"') q = true;
        else if (ch === ",") { row.push(cur); cur = ""; }
        else if (ch === "\n" || ch === "\r") {
          if (ch === "\r" && text[i + 1] === "\n") i++;
          row.push(cur); rows.push(row); row = []; cur = "";
        } else cur += ch;
      }
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
    rows = rows.filter(function (r) { return r.some(function (c) { return c.trim() !== ""; }); });
    if (!rows.length) return [];
    var headers = rows.shift().map(function (h) { return h.trim().toLowerCase(); });
    return rows.map(function (r) {
      var o = {};
      headers.forEach(function (h, idx) { o[h] = (r[idx] || "").trim(); });
      return o;
    });
  }

        if (!person || !person.email) { toast("No email for this person."); break; }
        window.open(Email.composeUrl(company, person), "_blank");
        if ((person.status || "red") === "red") Store.setPersonStatus(id, pidx, "yellow", { lastEmailAt: Date.now() });
        render(); toast("Opened Gmail to " + person.name + ".");
        break;
      }

      case "person-status":
        Store.setPersonStatus(id, Number(a.getAttribute("data-idx")), a.getAttribute("data-status"),
          a.getAttribute("data-status") === "yellow" ? { lastEmailAt: Date.now() } :
          a.getAttribute("data-status") === "green" ? { lastReplyAt: Date.now() } : {});
        render();
        break;

      case "person-thread": {
        var tp = (company.people || [])[Number(a.getAttribute("data-idx"))];
        if (tp && tp.email) window.open(Email.threadUrl({ email: tp.email, name: tp.name }), "_blank");
        break;
      }

      case "del-person":
        Store.removePerson(id, Number(a.getAttribute("data-idx")));
        render();
        break;

      case "refresh-phones": {
        toast("Checking for phone numbers…");
        App.Apollo.getPhones(company).then(function (map) {
          var n = Store.mergePhones(id, map);
          render();
          toast(n ? (n + " phone number(s) added.") : "No new phone numbers yet (they arrive a bit after reveal).");
        });
        break;
      }

      case "bulk-find": {
        bulkFindBuyers(a.getAttribute("data-country") || null);
        break;
      }

      case "discover-companies": {
        var cc = a.getAttribute("data-country");
        var country = App.countryByCode(cc);
        a.textContent = "⏳ Searching…"; a.setAttribute("disabled", "1");
        App.Apollo.findCompanies(country ? country.name : cc).then(function (res) {
          openCompanyPicker(cc, res);
        }).catch(function (err) { toast(err.message); }).then(function () { render(); });
        break;
      }

      case "save-discovered": {
        var dm = a.closest(".modal");
        var dcc = a.getAttribute("data-country");
        var chosen = [];
        dm.querySelectorAll("[data-company]:checked").forEach(function (el) {
          chosen.push(JSON.parse(decodeURIComponent(el.getAttribute("data-company"))));
        });
        if (!chosen.length) { toast("Select at least one company."); break; }
        var seed = chosen.map(function (x) {
          return { name: x.name, country: dcc, city: x.city || "", website: x.domain || "", materials: [], notes: "Discovered via Apollo — run Find buyers for contacts." };
        });
        var n = Store.importSeed(seed);
        closeModal(); render();
        toast(n + " companies added — now run “Find buyers (all)” to get emails.");
        break;
      }

      case "connect-gmail":
        window.open(App.Gmail.connectUrl(), "_blank");
        toast("Connect Gmail in the new tab, then click “Sync now”.");
        break;

      case "sync-gmail":
        syncGmail();
        break;

      case "check-opens": App.checkOpens(); break;

      case "team-pull":
        if (!App.Sync.enabled()) { toast("Enable team sync first (and Save)."); break; }
        toast("Pulling team data…");
        App.Sync.pull().then(function (j) {
          if (j && j.state && Store.applyRemote(j)) { render(); toast("Pulled latest team data."); }
          else toast("No shared data on the server yet — push first.");
        }).catch(function (e) { toast(e.message); });
        break;

      case "team-push":
        if (!App.Sync.enabled()) { toast("Enable team sync first (and Save)."); break; }
        toast("Pushing to team…");
        App.Sync.push().then(function (j) { toast("Pushed (rev " + (j.rev || "?") + ")."); })
          .catch(function (e) { toast(e.message); });
        break;

      case "import": importForm(); break;
      case "restore-file": { var fi = $("restore-file"); if (fi) fi.click(); break; }
      case "restore-snapshot": {
        var b = Store.lastSnapshot();
        if (!b || !b.ts) { toast("No snapshot saved yet."); break; }
        if (confirm("Restore the snapshot from " + new Date(b.ts).toLocaleString() + "? Current data will be replaced.")) {
          if (Store.restoreSnapshot()) { render(); toast("Snapshot restored."); }
        }
        break;
      }
      case "load-eu-seed": {
        var added = Store.importSeed(App.EU_SEED || []);
        closeModal(); render();
        toast(added ? (added + " starter companies loaded — now run “Find buyers”.") : "Starter list already loaded.");
        break;
      }
      case "do-import": {
        var txt = $("import-text").value.trim();
        if (!txt) { toast("Paste some data first."); break; }
        try {
          if (txt[0] === "{") { Store.importJSON(txt); toast("Backup restored."); }
          else {
            var rows = parseCSV(txt);
            var n = Store.importCompanyRows(rows);
            toast(n + " buyer(s) imported.");
          }
          closeModal(); render();
        } catch (err) { toast("Import failed: " + err.message); }
        break;
      }
      case "export": {
        var blob = new Blob([Store.exportJSON()], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var aEl = document.createElement("a");
        aEl.href = url; aEl.download = "metals-crm-backup.json"; aEl.click();
        URL.revokeObjectURL(url);
        toast("Backup downloaded.");
        break;
      }
      case "reset":
        if (confirm("This erases ALL buyers, prices and settings. Continue?")) {
          Store.resetAll(); render(); toast("Everything reset.");
        }
        break;
    }
  });

  App.onSheetCat = function (catId, value) { App.Store.renameSheetCategory(catId, value); };
  App.onSheetContact = function (catId, contactId, field, value) {
    var patch = {}; patch[field] = value;
    App.Store.updateSheetContact(catId, contactId, patch);
  };
  App.onDealStage = function (id, stage) { Store.updateDeal(id, { stage: stage }); render(); };
  App.onShip = function (id, field, value) { var p = {}; p[field] = value; Store.updateDeal(id, p); };

  // Auto-create a follow-up task when you email a buyer (deduped, optional).
  function addFollowupTask(company) {
    if (!company || Store.settings().autoFollowupTask === false) return;
    if (Store.tasks().some(function (t) { return !t.done && t.buyerId === company.id; })) return;
    var d = new Date(Date.now() + (Number(Store.settings().followUpDays) || 4) * 86400000);
    Store.addTask({ text: "Follow up: " + (company.name || "buyer"), due: d.toISOString().slice(0, 10), buyerId: company.id });
  }

  // Poll the proxy for email-link engagement and badge the buyers.
  App.checkOpens = function () {
    var base = (Store.settings().apolloProxyUrl || "http://localhost:8787").replace(/\/+$/, "");
    var ids = Store.companies().map(function (c) { return c.id; }).join(",");
    if (!ids) return;
    toast("Checking engagement…");
    fetch(base + "/api/track-opens?ids=" + encodeURIComponent(ids)).then(function (r) { return r.json(); }).then(function (j) {
      var n = Store.applyOpens(j.opens || {}); render();
      toast(n ? (n + " buyer(s) clicked your link.") : "No engagement recorded yet.");
    }).catch(function () { toast("Couldn't reach the proxy for tracking."); });
  };
  App.onGlobalSearch = function (v) {
    globalQ = v;
    if (route.view !== "search") route = { view: "search", country: null };
    $("content").innerHTML = viewSearch();
  };
  App.onTaskDone = function (id, done) { Store.updateTask(id, { done: done }); render(); };
  App.onTaskEdit = function (id, field, value) { var p = {}; p[field] = value; Store.updateTask(id, p); };

  App.calcProduct = function () {
    var sel = $("calc-prod"); if (!sel) return;
    var base = productBaseUSD(App.productById(sel.value));
    if (base != null) $("calc-base").value = base;
    App.recalcCalc();
  };
  App.recalcCalc = function () {
    if (!$("calc-base")) return;
    var n = function (id) { return Number(($(id) || {}).value) || 0; };
    var base = n("calc-base"), margin = n("calc-margin"), freight = n("calc-freight"),
        ins = n("calc-ins"), duty = n("calc-duty"), qty = n("calc-qty");
    var sell = base * (1 + margin / 100);           // your FOB sell price
    var cif = sell + freight;
    var insAmt = cif * ins / 100;
    var dutyAmt = (cif + insAmt) * duty / 100;
    var landed = cif + insAmt + dutyAmt;            // buyer's landed cost
    var profitMT = sell - base;
    function L(k, v, strong) { return '<div class="calc-row' + (strong ? " strong" : "") + '"><span>' + k + "</span><span>" + Prices.money(v) + "</span></div>"; }
    $("calc-out").innerHTML =
      L("Your FOB sell (base + " + margin + "%)", sell) +
      L("+ Freight", freight) +
      L("CIF", cif, false) +
      L("+ Insurance", insAmt) +
      L("+ Duty", dutyAmt) +
      L("Buyer landed cost / MT", landed, true) +
      '<hr style="border:none;border-top:1px solid var(--line);margin:8px 0">' +
      L("Your profit / MT", profitMT, true) +
      L("Total deal value (" + qty + " MT)", sell * qty) +
      L("Total profit (" + qty + " MT)", profitMT * qty, true);
  };

  App.onFilter = function (kind, value) {
    if (kind === "status") filterStatus = value; else if (kind === "metal") filterMetal = value;
    var c = $("content");
    if (route.view === "companies" || route.view === "country") c.innerHTML = viewCompanies(route.country);
  };

  App.onSearch = function (v) { query = v; var c = $("content");
    // re-render only the cards area to keep input focus
    if (route.view === "companies" || route.view === "country") {
      c.innerHTML = viewCompanies(route.country);
      var s = c.querySelector(".search");
      if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
    }
  };

  /* Auto-scan live prices ~once/day on load (if a source is configured).
     Surfaces the reason in the price bar if it can't (instead of silent). */
  function autoScanPrices() {
    if (Store.settings().autoScanPrices === false) return;
    if (Store.settings().priceSource === "manual") return;
    var p = Store.prices();
    var age = Date.now() - (p.updatedAt || 0);
    if (p.updatedAt && age < 12 * 3600 * 1000) return; // already fresh today
    App.priceMsg = "scanning…"; renderPriceBar();
    Prices.fetchLive().then(function (d) {
      if (d && (d.copper != null || d.aluminium != null || d.zinc != null)) {
        App.priceMsg = ""; Store.applyPriceFeed(d); renderPriceBar();
      } else {
        App.priceMsg = "Live feed returned no prices."; renderPriceBar();
      }
    }).catch(function (err) {
      App.priceMsg = err.message; renderPriceBar();
    });
  }

  /* Live ticker: re-fetch prices on an interval so the board updates itself. */
  function startLiveTicker() {
    if (App._liveTimer) clearInterval(App._liveTimer);
    var s = Store.settings();
    var secs = Number(s.priceLiveSeconds) || 0;
    if (secs <= 0 || s.priceSource === "manual") return;
    App._liveTimer = setInterval(function () {
      Prices.fetchLive(true).then(function (d) {
        if (d) { App.priceMsg = ""; Store.applyPriceFeed(d); renderPriceBar(); }
      }).catch(function (err) { App.priceMsg = err.message; renderPriceBar(); });
    }, Math.max(15, secs) * 1000);
  }
  App.startLiveTicker = startLiveTicker;

  /* boot */
  function boot() {
    render();
    setTimeout(autoScanPrices, 700);
    if (App.Sync) App.Sync.init(function () { render(); toast("Pulled latest team data."); });
    startLiveTicker();
    // daily local snapshot for safety
    try {
      if (Store.settings().autoBackup !== false) {
        var b = Store.lastSnapshot();
        if (!b || !b.ts || (Date.now() - b.ts) > 24 * 3600 * 1000) Store.takeSnapshot();
      }
    } catch (e) {}
  }
  document.addEventListener("DOMContentLoaded", boot);
  if (document.readyState !== "loading") boot();

})(window.App);

</script>
</body>
</html>
